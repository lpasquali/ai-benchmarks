apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rune.fullname" . }}
  labels:
    {{- include "rune.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "rune.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll the deployment whenever the ConfigMap changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "rune.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "rune.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      volumes:
        {{- if .Values.rune.kubeconfigSecret }}
        - name: kubeconfig
          secret:
            secretName: {{ .Values.rune.kubeconfigSecret }}
            items:
              - key: kubeconfig
                path: config
        {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "rune.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["serve"]
          ports:
            - name: http
              containerPort: {{ .Values.rune.api.port | int }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          env:
            # --- Backend / API server ---
            - name: RUNE_BACKEND
              value: {{ .Values.rune.backend | quote }}
            - name: RUNE_API_HOST
              value: {{ .Values.rune.api.host | quote }}
            - name: RUNE_API_PORT
              value: {{ .Values.rune.api.port | quote }}
            {{- if .Values.rune.api.baseUrl }}
            - name: RUNE_API_BASE_URL
              value: {{ .Values.rune.api.baseUrl | quote }}
            {{- end }}
            - name: RUNE_API_TENANT
              value: {{ .Values.rune.api.tenant | quote }}
            - name: RUNE_API_AUTH_DISABLED
              value: {{ .Values.rune.api.authDisabled | quote }}
            {{- if and .Values.rune.api.tokens (not .Values.rune.existingSecret) }}
            - name: RUNE_API_TOKENS
              value: {{ .Values.rune.api.tokens | quote }}
            {{- end }}
            # --- Debug ---
            - name: RUNE_DEBUG
              value: {{ .Values.rune.debug | quote }}
            # --- Vast.ai ---
            - name: RUNE_VASTAI
              value: {{ .Values.rune.vastai.enabled | quote }}
            - name: RUNE_VASTAI_TEMPLATE
              value: {{ .Values.rune.vastai.template | quote }}
            - name: RUNE_VASTAI_MIN_DPH
              value: {{ .Values.rune.vastai.minDph | quote }}
            - name: RUNE_VASTAI_MAX_DPH
              value: {{ .Values.rune.vastai.maxDph | quote }}
            - name: RUNE_VASTAI_RELIABILITY
              value: {{ .Values.rune.vastai.reliability | quote }}
            - name: RUNE_VASTAI_STOP_INSTANCE
              value: {{ .Values.rune.vastai.stopInstance | quote }}
            {{- if and .Values.rune.vastai.apiKey (not .Values.rune.existingSecret) }}
            - name: VAST_API_KEY
              value: {{ .Values.rune.vastai.apiKey | quote }}
            {{- end }}
            # --- Ollama ---
            - name: RUNE_OLLAMA_URL
              value: {{ .Values.rune.ollama.url | quote }}
            - name: RUNE_OLLAMA_WARMUP
              value: {{ .Values.rune.ollama.warmup | quote }}
            - name: RUNE_OLLAMA_WARMUP_TIMEOUT
              value: {{ .Values.rune.ollama.warmupTimeout | quote }}
            # --- Agent / Benchmark ---
            - name: RUNE_QUESTION
              value: {{ .Values.rune.question | quote }}
            - name: RUNE_MODEL
              value: {{ .Values.rune.model | quote }}
            {{- if .Values.rune.idempotencyKey }}
            - name: RUNE_IDEMPOTENCY_KEY
              value: {{ .Values.rune.idempotencyKey | quote }}
            {{- end }}
            # --- Kubeconfig path ---
            {{- if .Values.rune.kubeconfigSecret }}
            - name: RUNE_KUBECONFIG
              value: /root/.kube/config
            {{- else if .Values.rune.kubeconfig }}
            - name: RUNE_KUBECONFIG
              value: {{ .Values.rune.kubeconfig | quote }}
            {{- end }}
            # --- Extra arbitrary env vars ---
            {{- with .Values.rune.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if or .Values.rune.existingSecret .Values.rune.extraEnvFrom }}
          envFrom:
            {{- if .Values.rune.existingSecret }}
            - secretRef:
                name: {{ .Values.rune.existingSecret }}
            {{- end }}
            {{- with .Values.rune.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          volumeMounts:
            {{- if .Values.rune.kubeconfigSecret }}
            - name: kubeconfig
              mountPath: /root/.kube
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
