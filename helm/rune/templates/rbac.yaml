{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "rune.fullname" . }}
  labels:
    {{- include "rune.labels" . | nindent 4 }}
rules:
  # Core Kubernetes resources needed by HolmesGPT to investigate cluster health
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - nodes
      - services
      - endpoints
      - events
      - namespaces
      - persistentvolumeclaims
      - persistentvolumes
      - configmaps
      - replicationcontrollers
      - serviceaccounts
    verbs:
      {{- if .Values.rbac.readOnly }}
      - get
      - list
      - watch
      {{- else }}
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
      {{- end }}
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs:
      {{- if .Values.rbac.readOnly }}
      - get
      - list
      - watch
      {{- else }}
      - get
      - list
      - watch
      - update
      - patch
      {{- end }}
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs:
      - get
      - list
      - watch
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs:
      - get
      - list
      - watch
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - pods
      - nodes
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "rune.fullname" . }}
  labels:
    {{- include "rune.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "rune.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "rune.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
