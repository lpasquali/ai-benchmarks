# Default values for the RUNE Helm chart.
# Override these in your own values file or via --set.

replicaCount: 1

image:
  repository: ghcr.io/lpasquali/ai-benchmarks
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# ---------------------------------------------------------------------------
# Service Account
# ---------------------------------------------------------------------------
serviceAccount:
  # Specifies whether a service account should be created.
  create: true
  # Annotations to add to the service account.
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

# ---------------------------------------------------------------------------
# RBAC — ClusterRole to allow the RUNE pod to query the K8s cluster
# (required for HolmesGPT agentic commands)
# ---------------------------------------------------------------------------
rbac:
  create: true
  # Set to true if HolmesGPT only needs read access to most resources.
  readOnly: true

# ---------------------------------------------------------------------------
# Pod configuration
# ---------------------------------------------------------------------------
podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: false  # set true once the image runs as non-root

securityContext: {}

# ---------------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 8080
  # Annotations for the Service (e.g. cloud LB annotations)
  annotations: {}

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: rune.example.com
      paths:
        - path: /
          pathType: Prefix
  # TLS configuration — leave empty for HTTP-only, add entries for HTTPS.
  tls: []
  #  - secretName: rune-tls
  #    hosts:
  #      - rune.example.com

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# ---------------------------------------------------------------------------
# Autoscaling
# ---------------------------------------------------------------------------
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# ---------------------------------------------------------------------------
# Probes
# ---------------------------------------------------------------------------
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

# ---------------------------------------------------------------------------
# RUNE application configuration
# All keys map to RUNE_* environment variables inside the container.
# ---------------------------------------------------------------------------
rune:
  # --- Backend / API server ---
  backend: "local"             # RUNE_BACKEND: local | http
  api:
    host: "0.0.0.0"            # RUNE_API_HOST
    port: "8080"               # RUNE_API_PORT
    baseUrl: ""                # RUNE_API_BASE_URL (for http backend mode)
    tenant: "default"          # RUNE_API_TENANT
    authDisabled: "1"          # RUNE_API_AUTH_DISABLED: "1" to skip auth in dev
    # Tokens as comma-separated "tenant:token" pairs.
    # Provide via existingSecret instead of inline for production.
    tokens: ""                 # RUNE_API_TOKENS

  # --- Debug ---
  debug: "false"               # RUNE_DEBUG

  # --- Vast.ai ---
  vastai:
    enabled: "false"                                  # RUNE_VASTAI
    template: "c166c11f035d3a97871a23bd32ca6aba"      # RUNE_VASTAI_TEMPLATE
    minDph: "2.3"                                     # RUNE_VASTAI_MIN_DPH
    maxDph: "3.0"                                     # RUNE_VASTAI_MAX_DPH
    reliability: "0.99"                               # RUNE_VASTAI_RELIABILITY
    stopInstance: "false"                             # RUNE_VASTAI_STOP_INSTANCE
    # Vast.ai API key — use existingSecret in production instead of inline.
    apiKey: ""                                        # VAST_API_KEY

  # --- Ollama ---
  ollama:
    url: "http://ollama:11434"   # RUNE_OLLAMA_URL
    warmup: "true"               # RUNE_OLLAMA_WARMUP
    warmupTimeout: "300"         # RUNE_OLLAMA_WARMUP_TIMEOUT

  # --- Agent / Benchmark ---
  question: "What is unhealthy in this Kubernetes cluster?"  # RUNE_QUESTION
  model: "llama3.1:8b"                                       # RUNE_MODEL
  idempotencyKey: ""                                         # RUNE_IDEMPOTENCY_KEY

  # --- Kubeconfig ---
  # If the pod uses its own ServiceAccount (recommended), leave kubeconfig empty.
  # Supply a kubeconfig via an existing Secret only when connecting to an
  # external cluster different from the one the pod runs in.
  kubeconfig: ""               # RUNE_KUBECONFIG (path inside the pod)
  # Name of a pre-existing Secret containing a "kubeconfig" key.
  # The secret will be mounted at /root/.kube/config.
  kubeconfigSecret: ""

  # --- Sensitive values from an existing Secret ---
  # The secret must contain keys matching the env var names (without RUNE_ prefix
  # is fine — use envFrom with a secretRef and a prefix, or plain key names).
  # Leave empty to use inline values above.
  existingSecret: ""

  # --- Extra arbitrary environment variables ---
  extraEnv: []
  # - name: CUSTOM_VAR
  #   value: "custom-value"

  # --- Extra envFrom (ConfigMaps / Secrets) ---
  extraEnvFrom: []
  # - secretRef:
  #     name: my-rune-secret
