[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "rune-bench"
version = "0.1.0"
description = "RUNE — Reliability Use-case Numeric Evaluator"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.11"
keywords = ["benchmark", "kubernetes", "ollama", "llm", "reliability"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "typer>=0.9",
    "rich>=13.7",
    "holmesgpt>=0.23.0",
    "vastai",
    "anyio>=4.4",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-cov",
    "ruff",
    "mypy",
    "bandit",
]

[project.scripts]
rune = "rune.__main__:main"

[project.urls]
Homepage = "https://github.com/lpasquali/ai-benchmarks"
Repository = "https://github.com/lpasquali/ai-benchmarks"
Issues = "https://github.com/lpasquali/ai-benchmarks/issues"

[tool.setuptools.packages.find]
include = ["rune*", "rune_bench*"]

[tool.setuptools.package-data]
"*" = ["py.typed"]
