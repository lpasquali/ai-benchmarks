name: Coverage Check

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Restore virtualenv cache
        id: cache-venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.14-${{ hashFiles('requirements.txt', '.github/workflows/ci.yml') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y libjpeg-dev
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-xdist

      - name: Run tests with coverage
        run: .venv/bin/python -m pytest --cov --cov-report=term-missing:skip-covered --cov-fail-under=97

      - name: Generate coverage report
        if: always()
        run: .venv/bin/python -m coverage report

      - name: Upload coverage to artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && always() && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              const output = require('child_process').execSync('.venv/bin/python -m coverage report', { encoding: 'utf-8' });
              const lines = output.split('\n');
              const totalLine = lines.find((line) => line.trim().startsWith('TOTAL'));
              if (!totalLine) {
                console.log('Could not find TOTAL line in coverage report');
                return;
              }

              const percentMatch = totalLine.match(/(\d+)%\s*$/);
              if (!percentMatch) {
                console.log('Could not parse coverage percentage from TOTAL line:', totalLine);
                return;
              }

              const total = Number(percentMatch[1]);
              const comment = `## Coverage Report\n\n**Total Coverage:** ${total.toFixed(2)}%\n\n${total >= 97 ? '✅ Meets 97% threshold' : '❌ Below 97% threshold'}`;
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (e) {
              console.log('Could not generate coverage PR comment:', e.message);
            }

  test:
    name: Run Functional Tests
    needs: coverage
    if: ${{ needs.coverage.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Restore virtualenv cache
        id: cache-venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.14-${{ hashFiles('requirements.txt', '.github/workflows/ci.yml') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-xdist

      - name: Run unit tests
        run: .venv/bin/python -m pytest -p no:cov -o addopts='' tests/ -v --tb=short -x

      - name: Run CLI integration tests
        run: .venv/bin/python -m pytest -p no:cov -o addopts='' tests/test_rune_cli_integration.py -v --tb=short

      - name: Run API tests
        run: .venv/bin/python -m pytest -p no:cov -o addopts='' tests/test_api_*.py -v --tb=short

      - name: Run model manager tests
        run: .venv/bin/python -m pytest -p no:cov -o addopts='' tests/test_ollama_model_manager.py -v --tb=short

      - name: Run Vast.ai integration tests (mocked)
        run: .venv/bin/python -m pytest -p no:cov -o addopts='' tests/test_vastai_instance_manager.py tests/test_vastai_mocked.py -v --tb=short

      - name: Run error path tests
        run: .venv/bin/python -m pytest -p no:cov -o addopts='' tests/test_comprehensive_error_paths.py -v --tb=short

      - name: Run edge case tests
        run: .venv/bin/python -m pytest -p no:cov -o addopts='' tests/test_edge_cases_micro_branches.py -v --tb=short

      - name: Generate test report
        if: always()
        run: |
          .venv/bin/python -m pytest -p no:cov -o addopts='' tests/ --tb=short -v --junit-xml=test-results.xml 2>&1 || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-results.xml
          retention-days: 7

      - name: Report test status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ All functional tests passed"
          else
            echo "❌ Functional tests failed (see the first failed pytest step above)"
          fi

  docker-build:
    name: Docker Build Check
    needs: test
    if: ${{ needs.test.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Validate multi-arch build (amd64 + arm64, no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: rune:rune-ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build local amd64 image for runtime smoke tests
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: rune:rune-ci-local
          cache-from: type=gha

      - name: Smoke test container startup and health endpoint
        run: |
          set -euo pipefail
          docker run -d --rm --name rune-ci-smoke -p 18080:8080 rune:rune-ci-local
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:18080/healthz >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:18080/healthz
          docker logs rune-ci-smoke | tail -100 || true
          docker stop rune-ci-smoke

      - name: Smoke test CLI entrypoint in container
        run: |
          set -euo pipefail
          docker run --rm rune:rune-ci-local --help >/dev/null

      - name: Generate CycloneDX SBOM for container image (Syft)
        run: |
          set -euo pipefail
          mkdir -p sbom
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${PWD}:/work" \
            anchore/syft:v1.17.0 \
            rune:rune-ci-local \
            -o cyclonedx-json=/work/sbom/rune-image.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx
          path: sbom/rune-image.cdx.json
          retention-days: 14

      - name: Scan generated SBOM with Anchore Grype (container)
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${PWD}:/work" \
            anchore/grype:v0.82.0 \
            sbom:/work/sbom/rune-image.cdx.json \
            -o json > sbom/grype-results.json

      - name: Scan generated SBOM with Trivy (container)
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${PWD}:/work" \
            aquasec/trivy:0.57.1 \
            sbom /work/sbom/rune-image.cdx.json \
            --format json \
            --output /work/sbom/trivy-results.json \
            --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL

      - name: Summarize scanner results and enforce CVSS threshold
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          THRESHOLD = 8.8
          sbom_dir = Path("sbom")

          def safe_float(value):
              try:
                  return float(value)
              except (TypeError, ValueError):
                  return 0.0

          def parse_grype(path: Path):
              data = json.loads(path.read_text(encoding="utf-8"))
              rows = []
              for match in data.get("matches", []):
                  vuln = match.get("vulnerability", {})
                  artifact = match.get("artifact", {})
                  vuln_id = vuln.get("id", "UNKNOWN")
                  pkg = artifact.get("name", "unknown")
                  version = artifact.get("version", "unknown")
                  sev = vuln.get("severity", "UNKNOWN")

                  cvss_values = []
                  for cvss in vuln.get("cvss", []) or []:
                      cvss_values.append(safe_float(cvss.get("metrics", {}).get("baseScore")))
                      cvss_values.append(safe_float(cvss.get("metrics", {}).get("base_score")))
                  score = max(cvss_values) if cvss_values else 0.0

                  rows.append({
                      "scanner": "grype",
                      "id": vuln_id,
                      "package": f"{pkg}:{version}",
                      "severity": sev,
                      "cvss": score,
                  })
              return rows

          def parse_trivy(path: Path):
              data = json.loads(path.read_text(encoding="utf-8"))
              rows = []
              for result in data.get("Results", []) or []:
                  for vuln in result.get("Vulnerabilities", []) or []:
                      vuln_id = vuln.get("VulnerabilityID", "UNKNOWN")
                      pkg = vuln.get("PkgName") or result.get("Target") or "unknown"
                      version = vuln.get("InstalledVersion", "unknown")
                      sev = vuln.get("Severity", "UNKNOWN")
                      score = safe_float(vuln.get("CVSS", {}).get("nvd", {}).get("V3Score"))
                      if score == 0.0:
                          score = safe_float(vuln.get("CVSS", {}).get("redhat", {}).get("V3Score"))
                      if score == 0.0:
                          score = safe_float(vuln.get("CVSS", {}).get("ghsa", {}).get("V3Score"))

                      rows.append({
                          "scanner": "trivy",
                          "id": vuln_id,
                          "package": f"{pkg}:{version}",
                          "severity": sev,
                          "cvss": score,
                      })
              return rows

          findings = []
          findings.extend(parse_grype(sbom_dir / "grype-results.json"))
          findings.extend(parse_trivy(sbom_dir / "trivy-results.json"))

          findings.sort(key=lambda x: x["cvss"], reverse=True)
          high_risk = [f for f in findings if f["cvss"] > THRESHOLD]

          summary_lines = []
          summary_lines.append("SBOM vulnerability summary")
          summary_lines.append(f"Policy: fail if any CVE has CVSS > {THRESHOLD}")
          summary_lines.append("")
          summary_lines.append(f"Total findings: {len(findings)}")
          summary_lines.append(f"Findings over threshold: {len(high_risk)}")
          summary_lines.append("")
          summary_lines.append("Top findings (scanner | CVE | CVSS | severity | package)")
          for row in findings[:25]:
              summary_lines.append(
                  f"- {row['scanner']} | {row['id']} | {row['cvss']:.1f} | {row['severity']} | {row['package']}"
              )

          summary_text = "\n".join(summary_lines) + "\n"
          (sbom_dir / "security-summary.txt").write_text(summary_text, encoding="utf-8")

          step_summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if step_summary_path:
              Path(step_summary_path).write_text(
                  "## SBOM Security Summary\n\n```text\n" + summary_text + "```\n",
                  encoding="utf-8",
              )

          if high_risk:
              print(summary_text)
              print("\nBlocking merge: found vulnerability over policy threshold.")
              raise SystemExit(1)

          print(summary_text)
          PY

      - name: Create SARIF from security summary
        if: always()
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          summary_path = Path("sbom/security-summary.txt")
          message = summary_path.read_text(encoding="utf-8") if summary_path.exists() else "SBOM summary missing"

          sarif = {
              "version": "2.1.0",
              "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
              "runs": [
                  {
                      "tool": {
                          "driver": {
                              "name": "SBOM policy gate",
                              "informationUri": "https://github.com/lpasquali/rune",
                              "rules": [
                                  {
                                      "id": "SBOM-CVSS-THRESHOLD",
                                      "name": "Block CVSS > 8.8",
                                      "shortDescription": {"text": "Merge blocked when CVSS > 8.8 is found"},
                                      "fullDescription": {"text": "Policy gate over Grype + Trivy results"},
                                      "defaultConfiguration": {"level": "error"}
                                  }
                              ]
                          }
                      },
                      "results": [
                          {
                              "ruleId": "SBOM-CVSS-THRESHOLD",
                              "level": "note",
                              "message": {"text": message}
                          }
                      ]
                  }
              ]
          }

          Path("sbom/security-summary.sarif").write_text(json.dumps(sarif, indent=2), encoding="utf-8")
          PY

      - name: Upload SBOM and scanner outputs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sbom-security-outputs
          path: |
            sbom/rune-image.cdx.json
            sbom/grype-results.json
            sbom/trivy-results.json
            sbom/security-summary.txt
            sbom/security-summary.sarif
          retention-days: 14

  go-operator-check:
    name: Go Operator Check
    needs: test
    if: ${{ needs.test.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ${{ github.workspace }}/rune-operator
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: rune-operator/go.sum

      - name: Verify build
        run: go build ./...

      - name: Run tests
        run: go test ./... -v

  merge-gate:
    name: Merge Gate
    needs:
      - coverage
      - test
      - docker-build
      - go-operator-check
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate upstream job results
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os

          needs = json.loads(os.environ["NEEDS_JSON"])
          failed = []

          for name, payload in needs.items():
              result = payload.get("result")
              print(f"{name}: {result}")
              if result != "success":
                  failed.append((name, result))

          if failed:
              print("\nMerge blocked because one or more required CI jobs did not succeed:")
              for name, result in failed:
                  print(f"- {name}: {result}")
              raise SystemExit(1)

          print("\nAll required CI jobs succeeded. Merge gate passed.")
          PY
