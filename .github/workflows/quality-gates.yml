name: Quality Gates (RuneGate Grouped)

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  coverage-python:
    name: RuneGate/Coverage/Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: Coverage
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install --prefer-binary -r requirements.txt pytest pytest-cov pytest-xdist
          .venv/bin/python -m pytest --cov --cov-report=term-missing:skip-covered --cov-fail-under=97

  coverage-go:
    name: RuneGate/Coverage/Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: rune-operator/go.sum
      - run: |
          cd rune-operator
          go test ./... -coverprofile=coverage.out -covermode=atomic

  feature-python:
    name: RuneGate/Feature/Python
    needs: [coverage-python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
      - run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install --prefer-binary -r requirements.txt pytest pytest-xdist
          .venv/bin/python -m pytest -p no:cov -o addopts='' tests/ -m "not regression" -v --tb=short

  feature-go:
    name: RuneGate/Feature/Go
    needs: [coverage-go]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: rune-operator/go.sum
      - run: |
          cd rune-operator
          go test ./... -v

  linting-python:
    name: RuneGate/Linting/Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
      - run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install --prefer-binary -r requirements.txt ruff mypy
          .venv/bin/ruff check rune rune_bench
          .venv/bin/mypy rune rune_bench

  linting-go:
    name: RuneGate/Linting/Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: rune-operator/go.sum
      - run: |
          cd rune-operator
          test -z "$(gofmt -l .)"
          go vet ./...

  smoke-cli-api:
    name: RuneGate/CLI-and-API-Smoke/Python+Containers
    needs: [feature-python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
      - run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install --prefer-binary -r requirements.txt pytest
          .venv/bin/python -m pytest -p no:cov -o addopts='' tests/test_cli_http_mode.py tests/test_api_server.py -v --tb=short
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: rune:rune-ci-local
      - run: |
          set -euo pipefail
          docker run -d --rm --name rune-smoke -p 18080:8080 rune:rune-ci-local
          for i in {1..40}; do
            if curl -fsS http://127.0.0.1:18080/healthz >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:18080/healthz >/dev/null
          docker logs rune-smoke | tail -100 || true
          docker stop rune-smoke

  smoke-operator-container:
    name: RuneGate/CLI-and-API-Smoke/Go-Operator-Container
    needs: [feature-go]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: ./rune-operator
          file: ./rune-operator/Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: rune:rune-operator-ci
      - run: |
          docker run --rm rune:rune-operator-ci --help >/dev/null || true

  regression-python:
    name: RuneGate/Regression/Python
    needs: [feature-python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
      - run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install --prefer-binary -r requirements.txt pytest
          .venv/bin/python -m pytest -p no:cov -o addopts='' -m regression tests/ -v --tb=short

  regression-go:
    name: RuneGate/Regression/Go
    needs: [feature-go]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: rune-operator/go.sum
      - run: |
          cd rune-operator
          go test ./... -run Regression -v

  security-sbom:
    name: RuneGate/Security/SBOM-and-CVE-Policy
    needs: [feature-python, feature-go, linting-python, linting-go]
    runs-on: ubuntu-latest
    permissions:
      id-token: write      # required for SLSA provenance attestation
      attestations: write  # required for SLSA provenance attestation
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Build images
        run: |
          docker build -t rune:rune-ci-local -f Dockerfile .
          docker build -t rune:rune-operator-ci -f rune-operator/Dockerfile rune-operator
      - name: Generate SBOMs — CycloneDX via Syft (IEC 62443 4-1 ML4 SM-9)
        run: |
          set -euo pipefail
          mkdir -p sbom
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "${PWD}:/work" anchore/syft:v1.17.0 rune:rune-ci-local -o cyclonedx-json=/work/sbom/rune-image.cdx.json
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "${PWD}:/work" anchore/syft:v1.17.0 rune:rune-operator-ci -o cyclonedx-json=/work/sbom/operator-image.cdx.json
      - name: Scan SBOMs — Grype + Trivy (IEC 62443 4-1 ML4 SVV-3 / DM-4)
        run: |
          set -euo pipefail
          docker run --rm -v "${PWD}:/work" anchore/grype:v0.82.0 -c /work/.grype.yaml sbom:/work/sbom/rune-image.cdx.json -o json > sbom/rune-grype.json
          docker run --rm -v "${PWD}:/work" anchore/grype:v0.82.0 -c /work/.grype.yaml sbom:/work/sbom/operator-image.cdx.json -o json > sbom/operator-grype.json
          docker run --rm -v "${PWD}:/work" aquasec/trivy:0.57.1 sbom /work/sbom/rune-image.cdx.json --format json --output /work/sbom/rune-trivy.json --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          docker run --rm -v "${PWD}:/work" aquasec/trivy:0.57.1 sbom /work/sbom/operator-image.cdx.json --format json --output /work/sbom/operator-trivy.json --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
      - name: Enforce CVE policy — IEC 62443 4-1 ML4 DM-4
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          # IEC 62443 4-1 ML4 DM-4 blocking policy:
          #   Critical (CVSS >= 9.0): always block — requires fix or approved VEX entry
          #   High     (CVSS >  8.8): block only when a patched version exists
          #   Medium / Low:           logged in SBOM artifact, tracked via patch SLA
          THRESHOLD = 8.8
          CRITICAL  = 9.0

          def safe_float(v):
              try: return float(v or 0)
              except: return 0.0

          findings = []
          for f in sorted(Path('sbom').glob('*.json')):
              data = json.loads(f.read_text(encoding='utf-8'))
              if 'matches' in data:
                  for m in data.get('matches', []):
                      vuln = m.get('vulnerability', {})
                      fix_state = (vuln.get('fix') or {}).get('state', 'unknown')
                      fixable = fix_state == 'fixed'
                      scores = []
                      for c in vuln.get('cvss', []) or []:
                          metrics = c.get('metrics', {})
                          for k in ('baseScore', 'base_score'):
                              scores.append(safe_float(metrics.get(k)))
                      findings.append((vuln.get('id', 'UNKNOWN'), max(scores) if scores else 0.0, f.name, fixable))
              elif 'Results' in data:
                  for r in data.get('Results', []) or []:
                      for v in r.get('Vulnerabilities', []) or []:
                          score = 0.0
                          for vendor in ('nvd', 'redhat', 'ghsa'):
                              score = max(score, safe_float((v.get('CVSS') or {}).get(vendor, {}).get('V3Score')))
                          fixable = bool((v.get('FixedVersion') or '').strip())
                          findings.append((v.get('VulnerabilityID', 'UNKNOWN'), score, f.name, fixable))

          blocked = [x for x in findings if x[1] >= CRITICAL or (x[1] > THRESHOLD and x[3])]
          warned  = [x for x in findings if x[1] > THRESHOLD and not x[3] and x[1] < CRITICAL]

          print(f'Total findings     : {len(findings)}')
          print(f'Blocked (policy)   : {len(blocked)}')
          print(f'Warned (unfixable) : {len(warned)}  — logged in SBOM artifact, VEX acceptance required within patch SLA')
          for row in blocked[:30]:
              label = 'fixable' if row[3] else 'UNFIXABLE-CRITICAL'
              print(f'BLOCK [{label}] {row[0]}  cvss={row[1]:.1f}  src={row[2]}')
          for row in warned[:10]:
              print(f'WARN  [unfixable]  {row[0]}  cvss={row[1]:.1f}  src={row[2]}')
          if blocked:
              raise SystemExit(1)
          PY
      - name: Attest SBOM provenance — SLSA L3 (IEC 62443 4-1 ML4 SM-9)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            sbom/rune-image.cdx.json
            sbom/operator-image.cdx.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: sbom-security-outputs
          path: sbom/
          retention-days: 14

  security-sast:
    name: RuneGate/Security/SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: rune-operator/go.sum
      - name: Bandit + gosec aggregate gate (IEC 62443 4-1 ML4 SI-1 / SVV-1)
        run: |
          set -euo pipefail
          rc=0

          pip install bandit
          bandit -r rune rune_bench -ll -f json -o bandit-results.json || rc=1

          go install github.com/securego/gosec/v2/cmd/gosec@latest
          (cd rune-operator && gosec -fmt json -out ../gosec-results.json -severity high ./...) || rc=1

          python3 - <<'PY'
          import json
          from pathlib import Path

          bandit_path = Path('bandit-results.json')
          gosec_path = Path('gosec-results.json')

          bandit_findings = []
          if bandit_path.exists():
              bandit_findings = (json.loads(bandit_path.read_text(encoding='utf-8')).get('results') or [])

          gosec_findings = []
          if gosec_path.exists():
              gosec_findings = (json.loads(gosec_path.read_text(encoding='utf-8')).get('Issues') or [])

          bandit_block = [r for r in bandit_findings if r.get('issue_severity') == 'HIGH' and r.get('issue_confidence') == 'HIGH']
          gosec_block = [i for i in gosec_findings if i.get('severity') == 'HIGH' and i.get('confidence') == 'HIGH']

          print(f'Bandit findings: {len(bandit_findings)} | blocking(HIGH/HIGH): {len(bandit_block)}')
          for r in bandit_block[:20]:
              print(f"BANDIT BLOCK: {r.get('issue_text')} ({r.get('test_id')}) @ {r.get('filename')}:{r.get('line_number')}")

          print(f'gosec findings: {len(gosec_findings)} | blocking(HIGH/HIGH): {len(gosec_block)}')
          for i in gosec_block[:20]:
              print(f"GOSEC BLOCK: {i.get('details')} @ {i.get('file')}:{i.get('line')}")

          summary = Path('sast-summary.txt')
          summary.write_text(
              f"Bandit findings={len(bandit_findings)} blocking={len(bandit_block)}\n"
              f"gosec findings={len(gosec_findings)} blocking={len(gosec_block)}\n",
              encoding='utf-8',
          )

          if bandit_block or gosec_block:
              raise SystemExit(1)
          PY
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: sast-reports
          path: |
            bandit-results.json
            gosec-results.json
            sast-summary.txt
          retention-days: 14

  security-secrets:
    name: RuneGate/Security/SecretScanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: gitleaks — hardcoded credential detection (IEC 62443 4-1 ML4 SM-8)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-licenses:
    name: RuneGate/Security/LicenseCompliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: pip-licenses — dependency license audit (IEC 62443 4-1 ML4 SM-2)
        run: |
          set -euo pipefail
          rc=0

          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install --prefer-binary -r requirements.txt pip-licenses || rc=1

          if [ "$rc" -eq 0 ]; then
            pip-licenses --format=json --output-file=licenses-python.json || rc=1
          fi

          # Always produce artifact for diagnostics.
          if [ ! -f licenses-python.json ]; then
            printf '[]\n' > licenses-python.json
          fi

          if [ "$rc" -eq 0 ]; then
            pip-licenses --fail-on "GNU General Public License v3 (GPLv3);GNU Affero General Public License v3 (AGPLv3)" || rc=1
          fi

          exit "$rc"
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: license-reports
          path: licenses-python.json
          retention-days: 14

  merge-gate:
    name: Merge Gate
    if: always()
    needs:
      - coverage-python
      - coverage-go
      - feature-python
      - feature-go
      - linting-python
      - linting-go
      - smoke-cli-api
      - smoke-operator-container
      - regression-python
      - regression-go
      - security-sbom
      - security-sast
      - security-secrets
      - security-licenses
    runs-on: ubuntu-latest
    steps:
      - name: Verify all concept gates passed
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          python3 - <<'PY'
          import json, os
          data = json.loads(os.environ['NEEDS_JSON'])
          failed = [(k, v.get('result')) for k, v in data.items() if v.get('result') != 'success']
          for k, v in data.items():
              print(f'{k}: {v.get("result")}')
          if failed:
              print('Merge blocked due to failing RuneGate checks:')
              for item in failed:
                  print(f'- {item[0]}: {item[1]}')
              raise SystemExit(1)
          print('All RuneGate checks passed.')
          PY
