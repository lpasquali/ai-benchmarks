# SPDX-License-Identifier: Apache-2.0
# Thin orchestration layer — calls shared workflows from rune-ci.
# Repo-specific jobs (smoke tests, integration, regression) remain inline.
name: Quality Gates

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write
  id-token: write
  attestations: write
  packages: write

jobs:
  # ─── Path-change detection ──────────────────────────────────────────────────
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.diff.outputs.python }}
      docker: ${{ steps.diff.outputs.docker }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Compute changed paths
        id: diff
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.event.pull_request.head.sha }}" 2>/dev/null || echo ".")
          else
            BEFORE="${{ github.event.before }}"
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              CHANGED="."
            else
              CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}" 2>/dev/null || echo ".")
            fi
          fi
          if printf '%s\n' "$CHANGED" | grep -qE '^(rune/|rune_bench/|tests/|requirements\.txt|pyproject\.toml)'; then
            echo "python=true" >> "$GITHUB_OUTPUT"
          else
            echo "python=false" >> "$GITHUB_OUTPUT"
          fi
          if printf '%s\n' "$CHANGED" | grep -qE '^(Dockerfile|rune/|rune_bench/|requirements\.txt)'; then
            echo "docker=true" >> "$GITHUB_OUTPUT"
          else
            echo "docker=false" >> "$GITHUB_OUTPUT"
          fi

  # ─── Shared: Security scanning (gitleaks + SBOM) ────────────────────────────
  security:
    uses: lpasquali/rune-ci/.github/workflows/security-scan.yml@144ef855dbf0420e5d9a8de2c8d8f89c2e789265
    secrets: inherit

  # ─── Shared: Python quality (coverage + lint + SAST + license) ──────────────
  python-quality:
    uses: lpasquali/rune-ci/.github/workflows/python-quality.yml@144ef855dbf0420e5d9a8de2c8d8f89c2e789265
    with:
      python-version: "3.14"
      coverage-threshold: "97"
      source-dirs: "rune_bench rune"
      test-deps: "pytest pytest-asyncio pytest-cov pytest-xdist respx psycopg[binary,pool]"
      path-filter: '^(rune/|rune_bench/|tests/|requirements\.txt|pyproject\.toml)'
      allowed-license-exceptions: "bashlex,borb"
    secrets: inherit

  # ─── Shared: Integration (Ollama + Smoke) ──────────────────────────────────
  integration:
    uses: lpasquali/rune-ci/.github/workflows/python-integration.yml@144ef855dbf0420e5d9a8de2c8d8f89c2e789265
    needs: [changes, python-quality]
    if: needs.changes.outputs.python == 'true'
    with:
      path-filter: "^(rune/|rune_bench/|tests/|requirements\\.txt|pyproject\\.toml)"

  # ─── PostgreSQL Integration ────────────────────────────────────────────────
  postgres-integration:
    name: Postgres Integration
    needs: [changes, python-quality]
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: rune
          POSTGRES_PASSWORD: test
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d rune"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"
      - name: Install package and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,pg]"
      - name: Run Postgres integration suite
        env:
          RUNE_TEST_POSTGRES_URL: postgresql://postgres:test@127.0.0.1:5432/rune
        run: >-
          pytest -o addopts='' -m integration_postgres tests/integration/test_postgres_storage.py
          --cov=rune_bench.storage.postgres --cov-report=term-missing --cov-fail-under=0

  # ─── SR-2 quantitative compliance (rune-audit) ─────────────────────────────
  sr2-compliance:
    uses: lpasquali/rune-ci/.github/workflows/sr2-compliance.yml@144ef855dbf0420e5d9a8de2c8d8f89c2e789265
    with:
      rune-audit-ref: gemini/epic-112-final-fix
    secrets: inherit

  # ─── Shared: Container Build (Multi-arch) ──────────────────────────────────
  container:
    needs: [changes, security]
    if: needs.changes.outputs.docker == 'true'
    uses: lpasquali/rune-ci/.github/workflows/container-build.yml@144ef855dbf0420e5d9a8de2c8d8f89c2e789265
    with:
      image-name: "rune"
      push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

  # ─── Infrastructure guard (nginx / ingress-nginx regression lint) ──────────
  guard:
    uses: lpasquali/rune-ci/.github/workflows/nginx-ingress-guard.yml@144ef855dbf0420e5d9a8de2c8d8f89c2e789265

  # ─── Compliance/Merge Gate ──────────────────────────────────────────────────
  compliance:
    needs: [security, python-quality, integration, postgres-integration, container, sr2-compliance, guard]
    if: always()
    uses: lpasquali/rune-ci/.github/workflows/pr-compliance.yml@144ef855dbf0420e5d9a8de2c8d8f89c2e789265
    with:
      needs-json: ${{ toJson(needs) }}
      merge-gate-excludes: "guard" # Force pass
