# SPDX-License-Identifier: Apache-2.0
name: Project Board Backfill

# Adds all open issues and PRs that are not yet tracked on
# https://github.com/users/lpasquali/projects/1 to that board.
#
# Trigger manually from the Actions tab, or let it run on a schedule.
# Requires a fine-grained PAT (or classic PAT with `project` scope) stored
# in the repo secret PROJECT_TOKEN.

on:
  workflow_dispatch:
  schedule:
    # Every day at 06:00 UTC — catches items created while the event-driven
    # project-sync.yml was not running (e.g. during a secret rotation).
    - cron: "0 6 * * *"

permissions:
  contents: read

jobs:
  backfill:
    name: Backfill missing issues and PRs
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
      PROJECT_OWNER: lpasquali
      PROJECT_NUMBER: 1
      REPO: ${{ github.repository }}

    steps:
      - name: Add missing issues and PRs to project board
        shell: bash
        run: |
          set -euo pipefail

          # ── 1. Resolve the project node-ID ────────────────────────────────
          PROJECT_ID=$(gh api graphql \
            -f query='query($owner:String!,$number:Int!){
              user(login:$owner){
                projectV2(number:$number){ id }
              }
            }' \
            -f owner="${PROJECT_OWNER}" \
            -F number="${PROJECT_NUMBER}" \
            --jq '.data.user.projectV2.id')

          echo "Project ID: ${PROJECT_ID}"

          # ── 2. Collect node-IDs already in the board (paginated) ──────────
          declare -A IN_PROJECT=()
          CURSOR=""
          while true; do
            if [ -z "${CURSOR}" ]; then
              AFTER_ARG=""
            else
              AFTER_ARG=", after: \"${CURSOR}\""
            fi

            PAGE=$(gh api graphql \
              -f query="query(\$id:ID!){
                node(id:\$id){
                  ... on ProjectV2 {
                    items(first:100${AFTER_ARG}){
                      pageInfo{ hasNextPage endCursor }
                      nodes{
                        content{
                          ... on Issue       { id }
                          ... on PullRequest  { id }
                        }
                      }
                    }
                  }
                }
              }" \
              -f id="${PROJECT_ID}")

            # Mark each content node-ID as already present
            while IFS= read -r nid; do
              [ -n "${nid}" ] && IN_PROJECT["${nid}"]=1
            done < <(echo "${PAGE}" | jq -r \
              '.data.node.items.nodes[].content.id // empty')

            HAS_NEXT=$(echo "${PAGE}" | jq -r \
              '.data.node.items.pageInfo.hasNextPage')
            [ "${HAS_NEXT}" = "true" ] || break
            CURSOR=$(echo "${PAGE}" | jq -r \
              '.data.node.items.pageInfo.endCursor')
          done

          echo "Items already in board: ${#IN_PROJECT[@]}"

          # ── 3. Iterate over every issue and PR in the repo ────────────────
          OWNER="${REPO%%/*}"
          REPO_NAME="${REPO##*/}"
          ADDED=0
          SKIPPED=0

          # issues accept states OPEN|CLOSED; pull requests also accept MERGED
          for TYPE in issue pr; do
            if [ "${TYPE}" = "issue" ]; then
              GQL_TYPE="issues"
              STATES="[OPEN,CLOSED]"
            else
              GQL_TYPE="pullRequests"
              STATES="[OPEN,CLOSED,MERGED]"
            fi

            CURSOR=""
            while true; do
              if [ -z "${CURSOR}" ]; then
                AFTER_ARG=""
              else
                AFTER_ARG=", after: \"${CURSOR}\""
              fi

              PAGE=$(gh api graphql \
                -f query="query(\$owner:String!,\$repo:String!){
                  repository(owner:\$owner,name:\$repo){
                    ${GQL_TYPE}(first:100,states:${STATES}${AFTER_ARG}){
                      pageInfo{ hasNextPage endCursor }
                      nodes{ id }
                    }
                  }
                }" \
                -f owner="${OWNER}" \
                -f repo="${REPO_NAME}")

              while IFS= read -r NODE_ID; do
                [ -z "${NODE_ID}" ] && continue
                if [ -n "${IN_PROJECT[${NODE_ID}]+set}" ]; then
                  SKIPPED=$((SKIPPED + 1))
                else
                  gh api graphql \
                    -f query='mutation($project:ID!,$content:ID!){
                      addProjectV2ItemById(input:{projectId:$project,contentId:$content}){
                        item{ id }
                      }
                    }' \
                    -f project="${PROJECT_ID}" \
                    -f content="${NODE_ID}" > /dev/null
                  IN_PROJECT["${NODE_ID}"]=1
                  ADDED=$((ADDED + 1))
                  echo "  Added ${TYPE} node ${NODE_ID}"
                fi
              done < <(echo "${PAGE}" | jq -r \
                ".data.repository.${GQL_TYPE}.nodes[].id // empty")

              HAS_NEXT=$(echo "${PAGE}" | jq -r \
                ".data.repository.${GQL_TYPE}.pageInfo.hasNextPage")
              [ "${HAS_NEXT}" = "true" ] || break
              CURSOR=$(echo "${PAGE}" | jq -r \
                ".data.repository.${GQL_TYPE}.pageInfo.endCursor")
            done
          done

          echo "Done — added: ${ADDED}, already present (skipped): ${SKIPPED}"
