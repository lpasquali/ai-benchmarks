name: Coverage Check

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        run: |
          sudo apt-get install -y libjpeg-dev
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: pytest --cov --cov-report=term-missing:skip-covered --cov-fail-under=97

      - name: Generate coverage report
        if: always()
        run: coverage report

      - name: Upload coverage to artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && always() && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              const output = require('child_process').execSync('coverage report', { encoding: 'utf-8' });
              const lines = output.split('\n');
              const totalLine = lines.find((line) => line.trim().startsWith('TOTAL'));
              if (!totalLine) {
                console.log('Could not find TOTAL line in coverage report');
                return;
              }

              const percentMatch = totalLine.match(/(\d+)%\s*$/);
              if (!percentMatch) {
                console.log('Could not parse coverage percentage from TOTAL line:', totalLine);
                return;
              }

              const total = Number(percentMatch[1]);
              const comment = `## Coverage Report\n\n**Total Coverage:** ${total.toFixed(2)}%\n\n${total >= 97 ? '✅ Meets 97% threshold' : '❌ Below 97% threshold'}`;
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (e) {
              console.log('Could not generate coverage PR comment:', e.message);
            }

  test:
    name: Run Functional Tests
    needs: coverage
    if: ${{ needs.coverage.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-xdist

      - name: Run unit tests
        run: pytest tests/ -v --tb=short -x

      - name: Run CLI integration tests
        run: pytest tests/test_rune_cli_integration.py -v --tb=short

      - name: Run API tests
        run: pytest tests/test_api_*.py -v --tb=short

      - name: Run model manager tests
        run: pytest tests/test_ollama_model_manager.py -v --tb=short

      - name: Run Vast.ai integration tests (mocked)
        run: pytest tests/test_vastai_instance_manager.py tests/test_vastai_mocked.py -v --tb=short

      - name: Run error path tests
        run: pytest tests/test_comprehensive_error_paths.py -v --tb=short

      - name: Run edge case tests
        run: pytest tests/test_edge_cases_micro_branches.py -v --tb=short

      - name: Generate test report
        if: always()
        run: |
          pytest tests/ --tb=short -v --junit-xml=test-results.xml 2>&1 || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
          retention-days: 7

      - name: Report test status
        if: failure()
        run: |
          echo "❌ Functional tests failed"
          exit 1

      - name: Report test success
        if: success()
        run: echo "✅ All functional tests passed"

  docker-build:
    name: Docker Build Check
    needs: test
    if: ${{ needs.test.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ai-benchmarks:rune-ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
